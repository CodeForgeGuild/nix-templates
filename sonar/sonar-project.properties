# =============================================================================
# SonarQube / SonarCloud — project configuration
# Copy to repo root as sonar-project.properties and fill in the blanks.
# =============================================================================

# Unique project key on the SonarQube/SonarCloud server.
sonar.projectKey=<PROJECT_KEY>

# SonarCloud only: uncomment and set your organisation slug.
# sonar.organization=<ORG_SLUG>

# =============================================================================
# Language-specific coverage and report paths (uncomment what applies)
# =============================================================================

# -- Go --
# sonar.go.coverage.reportPaths=coverage.out
# sonar.go.golangci-lint.reportPaths=golangci-lint.xml

# -- Python --
# sonar.python.coverage.reportPaths=coverage.xml
# sonar.python.ruff.reportPaths=ruff.xml
# sonar.python.mypy.reportPaths=mypy.xml

# -- TypeScript / JavaScript --
# sonar.typescript.lcov.reportPaths=coverage/lcov.info
# sonar.javascript.lcov.reportPaths=coverage/lcov.info

# =============================================================================
# Source and test directories
# =============================================================================
# sonar.sources=src,cmd
# sonar.tests=tests
# sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# =============================================================================
# Exclusions
# =============================================================================
# sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**
# sonar.test.exclusions=**/src/test/mocks/**
