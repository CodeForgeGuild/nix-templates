repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check
        language: system
        types: [python]
        require_serial: true
        exclude: ^tests/

      - id: mypy
        name: mypy
        entry: uv run mypy .
        language: system
        types: [python]
        require_serial: true
        pass_filenames: false
