name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Ruff
        run: uv run ruff check --output-format github

      - name: MyPy
        run: uv run mypy --xml-report mypy.xml .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Run tests
        run: |
          uv run pytest \
            --cov=src \
            --cov-report=xml \
            -v || { e=$?; [ "$e" -eq 5 ] && exit 0; exit "$e"; }
